name: offline-claude

services:
  ollama-proxy:
    image: nginx:alpine
    volumes:
      - ./ollama-proxy.nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal}
    command: sh -c 'envsubst '\''$$OLLAMA_HOST'\'' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g "daemon off;"'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - claude-internal
      - host-egress

  claude-code:
    image: offline-claude:local
    working_dir: /home/claude/workspace
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    environment:
      ANTHROPIC_BASE_URL: http://ollama-proxy:11434
      ANTHROPIC_AUTH_TOKEN: ollama
      CLAUDE_MODEL: ${CLAUDE_MODEL}
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
      DISABLE_TELEMETRY: "1"
      DISABLE_ERROR_REPORTING: "1"
      DISABLE_FEEDBACK_COMMAND: "1"
      CLAUDE_CODE_DISABLE_FEEDBACK_SURVEY: "1"
      DISABLE_GROWTHBOOK: "1"
      DISABLE_AUTOUPDATER: "1"
      ENABLE_CLAUDEAI_MCP_SERVERS: "false"
      CLAUDE_CODE_DISABLE_FILE_CHECKPOINTING: "1"
    volumes:
      - ${PROJECT_DIR}:/home/claude/workspace
      - ${CLAUDE_STATE_DIR}:/home/claude/.claude
      - ${CLAUDE_CONFIG_JSON}:/home/claude/.claude.json
      # - /absolute/path/to/shared:/home/claude/shared:ro
    networks:
      - claude-internal

networks:
  claude-internal:
    internal: true
  host-egress: {}
