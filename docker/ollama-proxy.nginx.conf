# Ollama rejects requests whose Host is not localhost (see ollama/ollama#3269).
# TCP relay (socat) forwarded the client Host (e.g. ollama-proxy:11434), causing 403.
server {
    listen 11434;
    server_name _;

    location / {
        proxy_pass http://host.docker.internal:11434;
        proxy_http_version 1.1;
        proxy_set_header Host localhost:11434;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Ollama may 403 on API when Origin is present (see ollama/ollama#6021)
        proxy_set_header Origin "";
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }
}
